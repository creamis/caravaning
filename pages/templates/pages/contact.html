{% extends "base.html" %}

{% block title %}Contacto - Caravaning Project{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 bg-white p-5 rounded-4 shadow-sm">
            <h1 class="text-success fw-bold mb-4">Contacto</h1>
            <p>¿Tienes alguna duda, sugerencia o propuesta de colaboración? ¡Estamos aquí para escucharte!</p>
            
            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Nombre</label>
                    <input type="text" class="form-control rounded-3" id="name" placeholder="Tu nombre completo" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" class="form-control rounded-3" id="email" placeholder="nombre@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label fw-bold">Mensaje</label>
                    <textarea class="form-control rounded-3" id="message" rows="5" placeholder="Cuéntanos cómo podemos ayudarte..." required></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg rounded-3">Enviar mensaje</button>
                </div>
            </form>
            <p class="mt-4 text-center text-muted small">O escríbenos a: <a href="mailto:info@caravaningproject.com" class="text-success">info@caravaningproject.com</a></p>
        </div>
    </div>
</div>
{% endblock %}
