{% extends "base.html" %}
{% load static %}

{% block title %}Editar Perfil{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h2 class="mb-0 h4">Actualizar foto de perfil</h2>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="{{ form.profile_picture.id_for_label }}" class="form-label">Nueva imagen</label>
                            {{ form.profile_picture }}
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                        <a href="{% url 'users:profile' %}" class="btn btn-link w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
