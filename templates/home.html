{% extends "base.html" %}
{% load static %}

{% block title %}Inicio{% endblock %}

{% block content %}
<style>
    .hero-bg {
        background-image: url('https://www.saloncaravaning.com/app/uploads/sites/86/2023/07/istock-1385942908-1.jpg');
        background-size: cover;
        background-position: center;
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 1rem;
        box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .hero-content {
        background: rgba(0,0,0,0.6);
        padding: 2.5rem 2rem;
        border-radius: 1rem;
        text-align: center;
        color: #fff;
        max-width: 600px;
    }
    .hero-content h1 {
        font-size: 2.8rem;
        font-weight: bold;
        margin-bottom: 1rem;
    }
    .hero-content p {
        font-size: 1.3rem;
        margin-bottom: 0;
    }
</style>
<div class="container my-5">
    <div class="hero-bg dark:brightness-75">
        <div class="hero-content">
            <h1>
                
                Caravaning Project
            </h1>
            <p>
                Descubre, alquila y vive la experiencia de viajar en caravana.<br>
                ¡Tu aventura comienza aquí!
            </p>
        </div>
    </div>
</div>
{% endblock %}
