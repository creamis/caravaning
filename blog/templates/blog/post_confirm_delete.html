{% extends "base.html" %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-5 rounded-4 shadow-sm">
            <i class="bi bi-exclamation-triangle text-danger display-1 mb-4"></i>
            <h2 class="fw-bold">¿Eliminar Post?</h2>
            <p class="text-muted mb-4">Vas a eliminar "<strong>{{ object.title }}</strong>". Esta acción borrará el contenido y sus imágenes.</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg rounded-pill px-5 me-2">Sí, eliminar</button>
                <a href="{% url 'blog:user_posts' user.username %}" class="btn btn-light btn-lg rounded-pill px-5">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
